simulation_properties:

  - name: monte_carlo
    value: False
    trials: 20

  - name: ideal # this only applies to non-monte carlo simulations, monte carlo will include deviations and perturbations
    value: False

  - name: time_step
    value: 0.1 # seconds

  - name: max_simulation_time
    value: 600.0 # seconds

  - name: log_interval_steps
    value: 10.0

initial_conditions:

  - name: semi-major_axis
    value: 6968000.0 # m
    deviation: 10000 # m 

  - name: eccentricity
    value: 0.000
    deviation: 0.000

  - name: inclination
    value: 98.0 # degrees
    deviation: 0.0 # degrees

  - name: raan
    value: 171 # degrees
    deviation: 00 # degrees

  - name: argument_of_perigee
    value: 63 # degrees
    deviation: 00 # degrees

  - name: true_anomaly
    value: 0.0 # degrees
    deviation: 00 # degrees

  - name : attitude
    value: [1.0, 0.0, 0.0, 0.0] # quaternion (w x y z)

  - name: attitude_rate
    value: [1.0407409737537963, 1.0407409737537963, 0] # rad/s (10 rpm), This applies to non-montecarlo runs
    nominal_value: [0, 0, 0] # rad/s, This applies to monte-carlo runs
    deviation: [0.9, 0.9, 0.9] # rad/s
    perturbation: [0.04, 0.04, 0.04] # absolute value, rad/s


physical_properties:

  - name: main_body
    dimensions:
      x: 0.1 # m
      y: 0.1 # m
      z: 0.1 # m
    faces:
      face_dimensions: # m
        x+: [0.1, 0.1] 
        x-: [0.1, 0.1] 
        y+: [0.1, 0.1] 
        y-: [0.1, 0.1] 
        z+: [0.1, 0.1] 
        z-: [0.1, 0.1] 
      face_normals: # unit normal
        x+: [1.0, 0.0, 0.0]  
        x-: [-1.0, 0.0, 0.0]
        y+: [0.0, 1.0, 0.0]
        y-: [0.0, -1.0, 0.0]
        z+: [0.0, 0.0, 1.0]
        z-: [0.0, 0.0, -1.0]
    geometric_center: 
      x: 0.0 # m
      y: 0.0 # m
      z: 0.0 # m
    mass: 1.15 # kg
    mass_deviation: 0.05 # kg

  - name: x+_deployable
    dimensions:
      x: 0.1 # m
      y: 0.082 # m
      z: 0.00385 # m
    faces:
      face_dimensions: # m
        z+: [0.1, 0.082]
        z-: [0.1, 0.082]
      face_normals: 
        z+: [1.0, 0.0, 0.0]
        z-: [-1.0, 0.0, 0.0]
    geometric_center:
      x: 0.1 # m
      y: 0.0 # m
      z: 0.498075 # m
    normal_vector: 
      x: 1.0
      y: 0.0
      z: 0.0
    mass: 0.03507 # kg
    mass_deviation: 0.01 # kg

  - name: x-_deployable
    dimensions: 
      x: 0.1 # m
      y: 0.082 # m
      z: 0.00385 # m
    faces:
      face_dimensions: # m
        z+: [0.1, 0.082]
        z-: [0.1, 0.082]
      face_normals: # unit normal
        z+: [1.0, 0.0, 0.0]
        z-: [-1.0, 0.0, 0.0]
    geometric_center:
      x: -0.1 # m
      y: 0.0 # m
      z: 0.498075 # m
    normal_vector: 
      x: -1.0
      y: 0.0
      z: 0.0
    mass: 0.03507 # kg
    mass_deviation: 0.01 # kg

  - name: y+_deployable
    dimensions: 
      x: 0.082 # m
      y: 0.1 # m
      z: 0.00385 # m
    faces:
      face_dimensions: # m
        z+: [0.082, 0.1]
        z-: [0.082, 0.1]
      face_normals: # unit normal
        z+: [0.0, 1.0, 0.0]
        z-: [0.0, -1.0, 0.0]
    geometric_center:
      x: 0.0 # m
      y: 0.1 # m
      z: 0.498075 # m
    normal_vector: 
      x: 0.0
      y: 1.0
      z: 0.0
    mass: 0.03507 # kg
    mass_deviation: 0.01 # kg

  - name: y-_deployable
    dimensions: 
      x: 0.082 # m
      y: 0.1 # m
      z: 0.00385 # m
    faces:
      face_dimensions: # m
        z+: [0.082, 0.1]
        z-: [0.082, 0.1]
      face_normals: # unit normal
        z+: [0.0, 1.0, 0.0]
        z-: [0.0, -1.0, 0.0]
    geometric_center:
      x: 0.0 # m
      y: -0.1 # m
      z: 0.498075 # m
    normal_vector: 
      x: 0.0
      y: -1.0
      z: 0.0
    mass: 0.03507 # kg
    mass_deviation: 0.01 # kg


dynamics_properties:

  - name: state_size
    value: 13 # position, velocity, quaternion, angular velocity


integration_properties:

  # For future use in the potential of using a different integration scheme
  - name: integration_method
    value: rk4

plotting_properties:

  - name: layout
    value: separate # together or separate

  - name: attitude_plot_layout
    value: overlay # overlay or stacked; applies to attitude and angular velocity plots

  - name: attitude_representation
    value: euler # quaternion or euler
